<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>בלאגנזה 🎵</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&family=Fredoka+One&display=swap" rel="stylesheet">
    
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
        import { getDatabase, ref, push, onValue, runTransaction, get, set } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';
        
        const cfg = {
            apiKey: "AIzaSyDg6kV3CU-0yobAFr8B38UyI5hrHgT-Imo",
            authDomain: "balaganza.firebaseapp.com",
            projectId: "balaganza",
            storageBucket: "balaganza.firebasestorage.app",
            messagingSenderId: "421961221113",
            appId: "1:421961221113:web:ef25695be38b3f10e0f328",
            databaseURL: "https://balaganza-default-rtdb.firebaseio.com"
        };
        
        const app = initializeApp(cfg);
        const db = getDatabase(app);
        window._fb = { db, ref, push, onValue, runTransaction, get, set };
    </script>

    <style>
        :root {
            --p: #ff3366;
            --s: #7000ff;
            --bg: #0a0a0c;
            --t: #ffffff;
            --g: linear-gradient(135deg, var(--p), var(--s));
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Heebo', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg);
            color: var(--t);
            overflow-x: hidden;
            min-height: 100vh;
        }

        .screen {
            display: none;
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
            animation: fadeIn 0.4s ease;
        }

        .active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1, h2, h3 {
            font-family: 'Fredoka One', cursive;
            text-align: center;
            margin-bottom: 20px;
            text-shadow: 0 0 15px rgba(255,51,102,0.4);
        }

        .btn {
            background: var(--g);
            border: none;
            color: #fff;
            padding: 15px 25px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn:active {
            transform: scale(0.96);
        }

        .card {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 15px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .track-item {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255,255,255,0.03);
            padding: 10px;
            border-radius: 12px;
            margin-bottom: 8px;
        }

        .track-img {
            width: 50px;
            height: 50px;
            border-radius: 8px;
            object-fit: cover;
        }

        .track-info {
            flex: 1;
            overflow: hidden;
        }

        .track-name {
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .track-artist {
            font-size: 0.85rem;
            opacity: 0.7;
        }

        .vote-count {
            font-weight: 900;
            font-size: 1.2rem;
            color: var(--p);
            margin-left: 10px;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px;
            border-radius: 15px;
            border: none;
            background: rgba(255,255,255,0.1);
            color: #fff;
            margin-bottom: 15px;
            font-size: 1rem;
            outline: none;
            border: 1px solid transparent;
        }

        input[type="text"]:focus {
            border-color: var(--p);
        }

        #playerBar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(10,10,12,0.95);
            backdrop-filter: blur(10px);
            padding: 12px 20px;
            display: none;
            border-top: 1px solid var(--p);
            z-index: 100;
            align-items: center;
            gap: 15px;
        }

        #playerBar.show {
            display: flex;
        }

        .pb-info {
            flex: 1;
            min-width: 0;
        }

        .pb-progress-bg {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: rgba(255,255,255,0.1);
        }

        #pbProgress {
            height: 100%;
            background: var(--p);
            width: 0%;
            transition: width 0.1s linear;
        }

        .prev-btn {
            background: none;
            border: 2px solid #fff;
            color: #fff;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
            cursor: pointer;
        }

        .playing {
            border-color: var(--p);
            color: var(--p);
        }
        
        .vote-btn {
            background: var(--p);
            width: 34px;
            height: 34px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            cursor: pointer;
            flex-shrink: 0;
        }
    </style>
</head>
<body>

    <div id="sc-home" class="screen active">
        <h1>BALAGANZA</h1>
        <div class="card" style="text-align:center">
            <p style="margin-bottom:20px;font-size:1.2rem">המוזיקה במסיבה בידיים שלכם!</p>
            <button class="btn" onclick="nav('sc-search')">🔍 חיפוש והוספת שירים</button>
            <button class="btn" onclick="nav('sc-list')" style="background:rgba(255,255,255,0.1)">📊 הרשימה המעודכנת</button>
            <div style="margin-top: 40px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px;">
                <p style="font-size: 0.9rem; opacity: 0.6; margin-bottom: 10px;">אזור הדיג'יי</p>
                <button class="btn" onclick="loginSpotify()" style="background:#1DB954">🎧 התחברות ל-Spotify</button>
            </div>
        </div>
    </div>

    <div id="sc-search" class="screen">
        <h2>מה בא לכם לשמוע?</h2>
        <input type="text" id="searchInput" placeholder="חפשו שיר או אמן...">
        <div id="results"></div>
        <button class="btn" onclick="nav('sc-home')" style="background:none; border:1px solid #666; margin-top:20px">חזרה</button>
    </div>

    <div id="sc-list" class="screen">
        <h2>דירוג השירים</h2>
        <div id="votedList"></div>
        
        <div id="djPanel" style="display:none; margin-top:30px; border-top:2px solid var(--p); padding-top:20px">
            <h3>ניהול פלייליסט</h3>
            <button class="btn" onclick="exportSpotify()" style="background:#1DB954">💾 ייצוא ל-Spotify</button>
        </div>
        
        <button class="btn" onclick="nav('sc-home')" style="background:none; border:1px solid #666; margin-top:20px">חזרה</button>
    </div>

    <div id="playerBar">
        <div class="pb-progress-bg"><div id="pbProgress"></div></div>
        <img id="pbArt" src="" style="width:40px; height:40px; border-radius:4px">
        <div class="pb-info">
            <div id="pbName" class="track-name" style="font-size:0.9rem"></div>
            <div id="pbArtist" class="track-artist" style="font-size:0.75rem"></div>
        </div>
        <button onclick="stopPreview()" style="background:none; border:none; color:#fff; font-size:20px; cursor:pointer">✕</button>
    </div>

    <script>
        // --- Configuration ---
        const clientId = 'c7e85743b2f545a98292440331006a88'; 
        const redirectUri = window.location.origin + window.location.pathname;
        const scopes = 'user-read-private user-read-email playlist-read-private playlist-modify-public playlist-modify-private';

        // --- Auth Logic ---
        function loginSpotify() {
            const authUrl = `https://accounts.spotify.com/authorize?client_id=${clientId}&response_type=token&redirect_uri=${encodeURIComponent(redirectUri)}&scope=${encodeURIComponent(scopes)}&show_dialog=true`;
            window.location.href = authUrl;
        }

        window.addEventListener('load', () => {
            const hash = window.location.hash.substring(1);
            const params = new URLSearchParams(hash);
            const token = params.get('access_token');
            if(token) {
                localStorage.setItem('spotify_token', token);
                window.location.hash = ''; 
                nav('sc-list');
            }
            checkDJStatus();
            loadVotedList();
        });

        function checkDJStatus() {
            if(localStorage.getItem('spotify_token')) {
                document.getElementById('djPanel').style.display = 'block';
            }
        }

        function nav(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            window.scrollTo(0,0);
        }

        // --- Spotify API Utilities ---
        async function spFetch(endpoint, options = {}) {
            const token = localStorage.getItem('spotify_token');
            if (!token) throw new Error('No access token found');
            
            const url = endpoint.startsWith('http') ? endpoint : `https://api.spotify.com/v1${endpoint}`;
            
            const res = await fetch(url, {
                ...options,
                headers: {
                    ...options.headers,
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                }
            });

            if (res.status === 401) {
                localStorage.removeItem('spotify_token');
                alert('פג תוקף החיבור לספוטיפיי, אנא התחבר שוב');
                nav('sc-home');
                return null;
            }
            return res;
        }

        // --- Search Logic ---
        const searchInput = document.getElementById('searchInput');
        let searchTimeout;
        searchInput.addEventListener('input', () => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(async () => {
                const q = searchInput.value.trim();
                if(q.length < 2) return;
                
                try {
                    // חיפוש זמני באמצעות ה-Token הקיים (או מנגנון אחר)
                    const res = await spFetch(`/search?q=${encodeURIComponent(q)}&type=track&limit=15`);
                    if(!res) return;
                    const data = await res.json();
                    renderList(data.tracks.items, 'results', false);
                } catch(e) { console.error('Search error:', e); }
            }, 600);
        });

        // --- Firebase Votes ---
        async function vote(track) {
            const trackId = track.id;
            const voteRef = window._fb.ref(window._fb.db, `votes/${trackId}`);
            
            try {
                await window._fb.runTransaction(voteRef, (currentData) => {
                    if (currentData === null) {
                        return { 
                            id: track.id,
                            name: track.name,
                            artist: track.artists[0].name,
                            image: track.album.images[0].url,
                            uri: track.uri,
                            preview_url: track.preview_url,
                            votes: 1, 
                            timestamp: Date.now() 
                        };
                    } else {
                        currentData.votes = (currentData.votes || 0) + 1;
                        return currentData;
                    }
                });
                alert('הצבעתך עבור "' + track.name + '" נקלטה!');
            } catch(e) { console.error('Vote error:', e); }
        }

        function loadVotedList() {
            const votesRef = window._fb.ref(window._fb.db, 'votes');
            window._fb.onValue(votesRef, (snapshot) => {
                const data = snapshot.val();
                const container = document.getElementById('votedList');
                if(!data) {
                    container.innerHTML = '<p style="text-align:center; opacity:0.5; padding:20px;">אין עדיין שירים. היו הראשונים להוסיף!</p>';
                    return;
                }
                const sorted = Object.values(data).sort((a,b) => b.votes - a.votes);
                renderList(sorted, 'votedList', true);
            });
        }

        // --- Export Logic ---
        async function exportSpotify() {
            try {
                const votesRef = window._fb.ref(window._fb.db, 'votes');
                const snap = await window._fb.get(votesRef);
                if(!snap.exists()) return alert('אין שירים לייצוא');
                
                const tracks = Object.values(snap.val()).sort((a,b) => b.votes - a.votes);
                const uris = tracks.map(t => t.uri);

                const meRes = await spFetch('/me');
                const meData = await meRes.json();
                
                const plRes = await spFetch(`/users/${meData.id}/playlists`, {
                    method: 'POST',
                    body: JSON.stringify({
                        name: `Balaganza - ${new Date().toLocaleDateString('he-IL')}`,
                        description: 'פלייליסט שנוצר על ידי הקהל בבלאגנזה',
                        public: true
                    })
                });
                const plData = await plRes.json();
                
                await spFetch(`/playlists/${plData.id}/tracks`, {
                    method: 'POST',
                    body: JSON.stringify({ uris: uris })
                });

                alert('הפלייליסט נוצר בהצלחה בספוטיפיי שלך! 🎶');
            } catch(e) {
                console.error('Export error:', e);
                alert('חלה שגיאה בייצוא. וודא שאתה מחובר ושיש הרשאות מתאימות.');
            }
        }

        // --- UI Rendering ---
        function renderList(items, targetId, isVoted) {
            const container = document.getElementById(targetId);
            container.innerHTML = items.map(t => {
                const trackName = t.name.replace(/'/g, "\\'");
                const artistName = (t.artists?.[0]?.name || t.artist || "Unknown").replace(/'/g, "\\'");
                const img = t.album?.images[0]?.url || t.image || '';
                
                return `
                <div class="track-item">
                    <img src="${img}" class="track-img">
                    <div class="track-info">
                        <div class="track-name">${t.name}</div>
                        <div class="track-artist">${t.artists?.[0]?.name || t.artist}</div>
                    </div>
                    ${t.preview_url ? `
                        <button class="prev-btn" data-preview="${t.preview_url}" 
                        onclick="togglePreview(this, '${trackName}', '${artistName}', '${img}')">▶</button>
                    ` : ''}
                    ${isVoted ? 
                        `<div class="vote-count">${t.votes}</div>` : 
                        `<div class="vote-btn" onclick='vote(${JSON.stringify(t).replace(/'/g, "&apos;")})'>+</div>`
                    }
                </div>`;
            }).join('');
        }

        // --- Audio Preview Player ---
        let currentAudio = null;
        let currentPrevBtn = null;

        function togglePreview(btn, name, artist, art) {
            const url = btn.dataset.preview;
            if (currentAudio && !currentAudio.paused) {
                stopPreview();
                if (currentPrevBtn === btn) return;
            }
            
            currentPrevBtn = btn;
            currentAudio = new Audio(url);
            currentAudio.volume = 0.6;
            currentAudio.play();
            
            btn.classList.add('playing');
            btn.textContent = '⏹';
            
            document.getElementById('pbName').textContent = name;
            document.getElementById('pbArtist').textContent = artist;
            document.getElementById('pbArt').src = art || '';
            
            const bar = document.getElementById('playerBar');
            bar.classList.add('show');
            
            const prog = document.getElementById('pbProgress');
            currentAudio.ontimeupdate = () => {
                const pct = (currentAudio.currentTime / currentAudio.duration) * 100;
                prog.style.width = pct + '%';
            };
            currentAudio.onended = stopPreview;
        }

        function stopPreview() {
            if (currentAudio) {
                currentAudio.pause();
                currentAudio = null;
            }
            if (currentPrevBtn) {
                currentPrevBtn.classList.remove('playing');
                currentPrevBtn.textContent = '▶';
                currentPrevBtn = null;
            }
            document.getElementById('playerBar').classList.remove('show');
        }
    </script>
</body>
</html>
